name: ClaudeGod
options:
  bundleIdPrefix: com.lcharvol
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  ClaudeGod:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "*.entitlements"
          - "Info.plist"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lcharvol.claude-god
        PRODUCT_NAME: Claude God
        MARKETING_VERSION: "2.18.0"
        CURRENT_PROJECT_VERSION: "23"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: Sources/ClaudeGod.entitlements
      properties:
        com.apple.security.network.client: true
    dependencies:
      - target: ClaudeGodWidget
        embed: true

  ClaudeGodWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget
        excludes:
          - "Info.plist"
    info:
      path: Widget/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lcharvol.claude-god.widget
        PRODUCT_NAME: ClaudeGodWidget
        MARKETING_VERSION: "2.18.0"
        CURRENT_PROJECT_VERSION: "23"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: NO
